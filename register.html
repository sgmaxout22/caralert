<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAARTHI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
padding:20px;
}

.card{
width:100%;
max-width:500px;
background:#fff;
border-radius:25px;
padding:40px 30px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
text-align:center;
}

.logo img{
width:190px;
max-width:80%;
margin-bottom:20px;
}

h1{
font-size:30px;
margin-bottom:10px;
color:#111827;
}

p{
color:#6b7280;
margin-bottom:35px;
}

.option{
display:block;
width:100%;
padding:18px;
margin-bottom:18px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.register{
background:#0088cc;
color:#fff;
}

.register:hover{
background:#0073ad;
transform:translateY(-2px);
}

.activate{
background:#16a34a;
color:#fff;
}

.activate:hover{
background:#15803d;
transform:translateY(-2px);
}
</style>

</head>
<body>

<div class="card">

<div class="logo">
<img src="./LOGO.png" alt="SAARTHI">
</div>

<h1>Welcome to SAARTHI</h1>

<p>Select an option below</p>

<button class="option register"
onclick="location.href='signup.html'">
📝 New Registration
</button>

<button class="option activate"
onclick="location.href='activate.html'">
🚗 Activate Your SAARTHI QR
</button>

</div>

</body>
</html>
