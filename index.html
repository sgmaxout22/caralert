<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SG VERNA</title>
</head>

<body>

<h2>🚗 SG VERNA </h2>

<button onclick="sendAlert('Wrong Parking')">
🚫 Wrong Parking
</button>

<br><br>

<button onclick="sendAlert('Please Move Vehicle')">
🚗 Remove Car
</button>

<br><br>

<button onclick="sendAlert('Contact Owner')">
📞 Contact Owner
</button>

<br><br>

<textarea id="msg"
placeholder="Message"></textarea>

<script>

function sendAlert(type){

 navigator.geolocation.getCurrentPosition(pos => {

   const payload = {
      alert:type,
      location:
      `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`,
      message:
      document.getElementById('msg').value
   };

   fetch(
   'https://script.google.com/macros/s/AKfycbxRw4lcW3rpI6-ddOR_D2Df3bse90ww3U9O9jw2u23c-4de93lsGMiHeO3rVt-AVv08_A/exec',
   {
      method:'POST',
      body:JSON.stringify(payload)
   });

   alert("Alert Sent");
 });

}

</script>

</body>
</html>
