<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAARTHI Vehicle Owner Alert</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background: #081B33; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        .container { width:100%; max-width:480px; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border:1px solid rgba(255, 255, 255, 0.12); border-radius:24px; padding:30px; color:white; }
        .header { text-align:center; padding-bottom:30px; }
        .car-number { font-size:30px; font-weight:700; color:#fff; }
        .car-model { color: #00C853; text-transform: uppercase; font-weight:600; }
        .option-btn { width:100%; padding:15px; margin-bottom:10px; border:1px solid rgba(255, 255, 255, 0.2); border-radius:10px; background: transparent; color: white; cursor:pointer; text-align:left; }
        .option-btn.active { border: 2px solid #fff; background: rgba(255, 255, 255, 0.1); }
        textarea { width:100%; height:100px; margin-top:15px; padding:10px; border-radius:10px; background: rgba(0,0,0,0.2); color:white; border: 1px solid #444; }
        .submit-btn { width:100%; padding:15px; margin-top:20px; border:none; border-radius:10px; background: #0057FF; color:white; font-weight:700; cursor:pointer; }
        .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(8, 27, 51, 0.95); justify-content:center; align-items:center; color:white; flex-direction:column; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="formScreen">
        <div class="header">
            <div id="displayVehicleNo" class="car-number">LOADING...</div>
            <div id="displayVehicleModel" class="car-model">--</div>
        </div>
        <button class="option-btn" onclick="selectReason(this,'Wrong Parking')">🚫 Wrong Parking</button>
        <button class="option-btn" onclick="selectReason(this,'Remove Vehicle')">🚘 Please Remove Vehicle</button>
        <button class="option-btn" onclick="selectReason(this,'Contact Owner')">📞 Contact Owner</button>
        <textarea id="message" placeholder="Optional message..."></textarea>
        <button id="submitBtn" class="submit-btn" onclick="submitAlert()">SEND ALERT</button>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay"><div>Sending Alert...</div></div>

<script src="js/config.js"></script>
<script>
    let selectedReason = "";

    function selectReason(btn, reason) {
        document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedReason = reason;
    }

    // Load Data
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const scanId = urlParams.get('scan');
        if(scanId && typeof SCRIPT_URL !== 'undefined') {
            fetch(`${SCRIPT_URL}?scan=${scanId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("displayVehicleNo").innerText = data.vno;
                    document.getElementById("displayVehicleModel").innerText = data.vmodel;
                });
        }
    };

    function submitAlert() {
        if(!selectedReason) return alert("Please select a reason");
        if(typeof SCRIPT_URL === 'undefined') return alert("Configuration error.");
        
        document.getElementById("loadingOverlay").style.display = "flex";

        navigator.geolocation.getCurrentPosition(pos => {
            // Prepare data with 'action' parameter for the router
            const alertData = new URLSearchParams();
            alertData.append("action", "trigger_alert");
            alertData.append("vehicleNo", document.getElementById("displayVehicleNo").innerText);
            alertData.append("alert", selectedReason);
            alertData.append("message", document.getElementById("message").value);
            alertData.append("latitude", pos.coords.latitude);
            alertData.append("longitude", pos.coords.longitude);
            alertData.append("location", `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);

            fetch(SCRIPT_URL, { 
                method: "POST", 
                body: alertData 
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("loadingOverlay").style.display = "none";
                if(data.success) {
                    alert("Alert Sent Successfully!");
                } else {
                    alert("Failed to send alert.");
                }
            })
            .catch(err => {
                document.getElementById("loadingOverlay").style.display = "none";
                alert("Error connecting to server.");
            });
        }, () => {
            document.getElementById("loadingOverlay").style.display = "none";
            alert("Location access required to send alert.");
        });
    }
</script>
</body>
</html>
