<script>

let selectedReason = "";

function selectReason(btn, reason) {

  document.querySelectorAll(".option-btn").forEach(b => {
    b.classList.remove("active");
  });

  btn.classList.add("active");
  selectedReason = reason;
}

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxK7eqi2PzL4j0xrsCAxw-ryQE7nNoQBaLd6i6BLIR9BT8sG3LySMm-QKt4Ejz03eJTdA/exec";

function submitAlert() {

  if (selectedReason === "") {
    alert("Please select a reason.");
    return;
  }

  navigator.geolocation.getCurrentPosition(

    function(pos) {

      const payload = {
        action: "alert",
        alert: selectedReason,
        message: document.getElementById("message").value,
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        location:
          `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`,
        timestamp: new Date().toLocaleString()
      };

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      })
      .then(response => response.text())
      .then(result => {

        console.log(result);

        document.getElementById("formScreen").style.display = "none";
        document.getElementById("successScreen").style.display = "block";

        setTimeout(() => {

          try {
            window.close();
          } catch(e) {}

          window.location.replace("about:blank");

        }, 5000);

      })
      .catch(error => {

        console.error(error);
        alert("Unable to send alert.");

      });

    },

    function(error) {

      alert("Location permission is required.");

    }

  );
}

</script>
