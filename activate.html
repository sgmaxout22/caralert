<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAARTHI - Activate Your Car</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
padding:20px;
}

.card{
width:100%;
max-width:500px;
background:#fff;
border-radius:25px;
padding:35px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:180px;
max-width:80%;
height:auto;
}

h2{
text-align:center;
color:#111827;
margin-bottom:10px;
}

p{
text-align:center;
color:#6b7280;
margin-bottom:20px;
line-height:1.6;
}

.hidden{
display:none;
}

input{
width:100%;
padding:15px;
border:2px solid #e5e7eb;
border-radius:12px;
font-size:16px;
margin-bottom:18px;
}

input:focus{
outline:none;
border-color:#0088cc;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#0088cc;
color:#fff;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
background:#0073ad;
}

#msg{
margin-top:18px;
font-weight:600;
text-align:center;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="./LOGO.png" alt="SAARTHI Logo">
</div>

<div id="step1">

<h2>🚗 Activate Your Car</h2>

<p>
Please make sure <b>Telegram</b> is installed and activated on this phone before continuing.
</p>

<button onclick="next()">
Continue
</button>

</div>

<div id="step2" class="hidden">

<h2>Vehicle Activation</h2>

<input
id="vehicleNo"
placeholder="Vehicle Number (MH46AB1234)">

<input
id="activationCode"
placeholder="Activation Code">

<button onclick="activate()">
Activate
</button>

<div id="msg"></div>

</div>

</div>

<script src="config.js"></script>

<script>

function next(){

document.getElementById("step1").classList.add("hidden");
document.getElementById("step2").classList.remove("hidden");

}

async function activate(){

const v=document.getElementById("vehicleNo").value.trim().toUpperCase();
const c=document.getElementById("activationCode").value.trim();
const m=document.getElementById("msg");

if(!v || !c){

m.style.color="red";
m.innerHTML="Please enter Vehicle Number and Activation Code.";
return;

}

m.style.color="#0088cc";
m.innerHTML="Verifying...";

const fd=new FormData();

fd.append("action","activate");
fd.append("vehicleNo",v);
fd.append("activationCode",c);

try{

const r=await fetch(SCRIPT_URL,{
method:"POST",
body:fd
});

const text=await r.text();

console.log(text);

const j=JSON.parse(text);

if(j.status==="success"){

m.style.color="green";
m.innerHTML="✅ Activation successful.<br>Redirecting to Telegram...";

setTimeout(function(){

window.location.href="https://t.me/sg_car_alert_bot?start="+encodeURIComponent(v);

},1500);

}
else{

m.style.color="red";
m.innerHTML="❌ Please check your Vehicle Number or Activation Code.";

}

}
catch(err){

console.log(err);

m.style.color="red";
m.innerHTML="❌ Unable to contact server.";

}

}

</script>

</body>
</html>
