<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAARTHI - Activate Your Vehicle</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: #081B33; /* Matches Saarthi base dark aesthetic */
padding:20px;
position: relative;
overflow: hidden;
}

/* Premium Ambient Neon Blur Circles behind the card */
body::before, body::after {
content: '';
position: absolute;
width: 300px;
height: 300px;
border-radius: 50%;
filter: blur(80px);
z-index: 1;
opacity: 0.15;
}
body::before {
background: #0057FF;
top: 10%;
left: 10%;
}
body::after {
background: #00C853;
bottom: 10%;
right: 10%;
}

/* Dynamic Glassmorphism Container Card Styling */
.card {
width:100%;
max-width:480px;
background: rgba(255, 255, 255, 0.05);
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
border-radius:24px;
padding:40px 35px;
box-shadow:0 25px 60px rgba(0,0,0,.45);
border: 1px solid rgba(255, 255, 255, 0.12);
position: relative;
z-index: 2;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:160px;
max-width:80%;
height:auto;
filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
}

h2{
text-align:center;
font-size: 1.7rem;
font-weight: 700;
margin-bottom:12px;
background: linear-gradient(to right, #ffffff, #4DA3FF);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
letter-spacing: 0.5px;
}

p{
text-align:center;
color: #cbd5e1;
margin-bottom:28px;
line-height:1.7;
font-size: 0.95rem;
}

p b {
color: #4DA3FF;
}

.hidden{
display:none;
}

/* Modernized Interactive Form Fields */
input{
width:100%;
padding:15px 18px;
background: rgba(8, 27, 51, 0.6);
border: 1px solid rgba(255, 255, 255, 0.15);
border-radius:12px;
font-size:15px;
color: #fff;
margin-bottom:20px;
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

input::placeholder {
color: rgba(255, 255, 255, 0.3);
transition: color 0.2s ease;
}

/* Instantly hides the sample placeholder text when clicking to type */
input:focus::placeholder {
color: transparent;
}

input:focus{
outline:none;
border-color:#0057FF;
background: rgba(8, 27, 51, 0.8);
box-shadow: 0 0 15px rgba(0, 87, 255, 0.25);
transform: translateY(-1px);
}

/* High-Performance Neon Glow Action Button */
button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background: linear-gradient(135deg, #0057FF, #0077FF);
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow: 0 4px 15px rgba(0, 87, 255, 0.3);
letter-spacing: 0.5px;
}

button:hover{
transform:translateY(-2px);
background: linear-gradient(135deg, #00C853, #00E676);
box-shadow: 0 4px 20px rgba(0, 200, 83, 0.4);
}

button:active{
transform: translateY(0);
}

#msg{
margin-top:22px;
font-weight:600;
text-align:center;
font-size: 0.95rem;
line-height: 1.5;
padding: 10px;
border-radius: 8px;
transition: all 0.3s ease;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="./LOGO.png" alt="SAARTHI Logo">
</div>

<div id="step1">

<h2>🚗 Activate Your Car</h2>

<p>
Please make sure <b>Telegram</b> is installed and activated on this phone before continuing.
</p>

<button onclick="next()">
Continue
</button>
<button onclick="window.location.href='index.html'" style="background: rgba(255, 255, 255, 0.1); margin-top: 10px;">
    🏠 Back to Home
</button>
</div>

<div id="step2" class="hidden">

<h2>Vehicle Activation</h2>

<input
id="vehicleNo"
placeholder="Vehicle Number (MH46AB1234)">

<input
id="activationCode"
placeholder="Activation Code">

<button onclick="activate()">
Activate
</button>

<div id="msg"></div>

</div>

</div>

<!-- Kept Script Logic Completely Untouched -->
<script src="js/config.js"></script>

<script>

function next(){

document.getElementById("step1").classList.add("hidden");
document.getElementById("step2").classList.remove("hidden");

}

async function activate(){

const v=document.getElementById("vehicleNo").value.trim().toUpperCase();
const c=document.getElementById("activationCode").value.trim();
const m=document.getElementById("msg");

if(!v || !c){

m.style.color="#ef4444"; /* Softened deep red for pristine dark UI presentation */
m.innerHTML="Please enter Vehicle Number and Activation Code.";
return;

}

m.style.color="#4DA3FF";
m.innerHTML="Verifying...";

const fd=new FormData();

fd.append("action","activate");
fd.append("vehicleNo",v);
fd.append("activationCode",c);

try{

const r=await fetch(SCRIPT_URL,{
method:"POST",
body:fd
});

const text=await r.text();

console.log(text);

const j=JSON.parse(text);

if(j.status==="success"){

m.style.color="#00C853";
m.innerHTML="✅ Activation successful.<br>Redirecting to Telegram...";

setTimeout(function(){

window.location.href="https://t.me/sg_car_alert_bot?start="+encodeURIComponent(v);

},1500);

}
else{

m.style.color="#ef4444";
m.innerHTML="❌ Please check your Vehicle Number or Activation Code.";

}

}
catch(err){

console.log(err);

m.style.color="#ef4444";
m.innerHTML="❌ Unable to contact server.";

}

}

</script>

</body>
</html>
